<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sahra's Mango Quest — Orchard Dusk</title>
<style>
  html, body { margin:0; padding:0; background:#141426; overflow:hidden; height:100%;
    font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif; }
  canvas { display:block; touch-action:none; -webkit-user-select:none; user-select:none; }
  #toast { position:fixed; top:52px; right:12px; color:#FBF3E4; background:rgba(30,26,42,.72);
    padding:5px 12px; border-radius:14px; font-size:13px; font-style:italic; opacity:0;
    transition:opacity .4s; pointer-events:none; z-index:5; }
  #v1link { position:fixed; bottom:10px; left:12px; color:#FBF3E4; opacity:.45; font-size:12px;
    font-style:italic; text-decoration:none; z-index:5; }
  #v1link:hover { opacity:.9; }
  #curtainUI { position:fixed; left:50%; transform:translateX(-50%); bottom:7%;
    display:none; z-index:6; text-align:center; }
  #curtainUI button, #curtainUI input {
    font-family:Georgia, serif; font-size:16px; background:#FBF3E4; color:#3A2B3E;
    border:1.5px solid #3A2B3E; border-radius:8px; padding:7px 14px; margin:0 4px; cursor:pointer; }
  #curtainUI input { width:56px; text-align:center; text-transform:uppercase; }
  #curtainUI button:active { background:#F6C453; }
  #encoreRow { margin-top:10px; }
  .uiLabel { color:#FBF3E4; font-size:13px; font-style:italic; margin-bottom:6px; opacity:.85; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="toast"></div>
<a id="v1link" href="v1.html">the original (2025) →</a>
<div id="curtainUI">
  <div class="uiLabel">sign the playbill</div>
  <div id="initialsRow">
    <button data-ini="S">S</button>
    <button data-ini="D">D</button>
    <input id="iniInput" maxlength="3" placeholder="ABC">
    <button id="iniSave">sign</button>
  </div>
  <div id="encoreRow"><button id="encoreBtn">Encore ↻</button></div>
</div>

<script>
'use strict';
// ---------------------------------------------------------------- constants
const PAL = {
  crimson:'#B23A2A', orange:'#E8863A', gold:'#F6C453', leaf:'#58A83C',
  deepLeaf:'#2E6B24', stem:'#5D3A24', plum:'#3A2B3E', paper:'#FBF3E4'
};
// act skies: [top, mid, bottom]
const ACT_SKIES = [
  ['#FFE9C2', '#FFD9A0', '#F5A97F'],   // I  — golden hour
  ['#F5A97F', '#C98BA0', '#8E7BA8'],   // II — dusk
  ['#2B2D42', '#232338', '#141426']    // III — night
];
const ACT_NAMES = ['Golden Hour', 'Dusk', 'Night'];
const BELLY_MAX = 45;                   // honey +1, miyazaki +3
const ACT_AT = [0, 15, 30];             // belly thresholds per act
const MANGO_TYPES = [                   // v1 canon, rarity intact
  { name:'Honey',    key:'mango_honey',    points:10,  rarity:0.7, belly:1 },
  { name:'Moldy',    key:'mango_moldy',    points:-30, rarity:0.2, belly:0 },
  { name:'Miyazaki', key:'mango_miyazaki', points:100, rarity:0.1, belly:3 }
];
const FIREFLY_LINES = [
  { t:"i vant weiner schnitzel" },
  { t:"this ass is on fiRE" },
  { t:"it's dark in here!", act:3 },
  { t:"insectum means bug!" },
  { t:"looking for a star..." },
  { t:"turn left at glowing toadstool, don't touch the ferns...", mumble:true },
  { t:"I was once in a low budget film... where is it?" },
  { t:"am i a terrorist? this ass is bomb", boom:true },
  { t:"Vâ-veylâ! واویلا" }
];
const POUF_STING_START = 10;            // pouf_violin.m4a is a 40s cut; the swell lands 10s in
const PENTA = [220, 277.18, 329.63, 369.99, 440, 554.37, 659.25, 739.99, 880];

// ---------------------------------------------------------------- canvas
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---------------------------------------------------------------- helpers
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
function hexLerp(h1, h2, t) {
  const p = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const a = p(h1), b = p(h2);
  return `rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(',')})`;
}
const easeOut = t => 1 - Math.pow(1 - t, 3);

// ---------------------------------------------------------------- assets
const IMGS = {};
['mango_miyazaki','mango_honey','mango_moldy','bat_open','bat_closed',
 'trees_far','trees_near','ground','title','mountains'].forEach(key => {
  const img = new Image();
  img.onload = () => { IMGS[key] = img; };
  img.onerror = () => {};
  img.src = 'assets/' + key + '.png';
});

// ---------------------------------------------------------------- game state
let state = 'title';               // title | play | curtain
let paused = false;
let tGlobal = 0;

const bat = { x:0, y:0, vy:0, holding:false, frame:0, flapT:0, r:30 };
let camX = 0, worldSpeed = 175;
let mangoes = [], particles = [], popups = [], wanderers = [];
let spawnX = 0;
let belly = 0, holyCount = 0, pluckTotal = 0;
let combo = 0, comboT = 0, bestCombo = 0;
let act = 0, actBlend = 0;         // actBlend eases toward act
let actCard = null;                // {name, t}
let dizzyT = 0;
let messenger = null;              // the line-carrying firefly
let usedLines = new Set();
let curtain = null;                // {t, perchY, signed}
let stars = [];
for (let i = 0; i < 70; i++) stars.push({ x:Math.random(), y:Math.random()*0.55, r:rand(0.6,1.7), tw:rand(0,6) });

function resetRun() {
  camX = 0; spawnX = 300;
  bat.x = 0; bat.y = H * 0.45; bat.vy = 0; bat.holding = false;
  mangoes = []; particles = []; popups = []; wanderers = [];
  belly = 0; holyCount = 0; pluckTotal = 0;
  combo = 0; comboT = 0; bestCombo = 0;
  act = 0; actBlend = 0; actCard = null; dizzyT = 0;
  messenger = null; usedLines = new Set(); curtain = null;
  curtainUI.style.display = 'none';
  music.setContext({ act:1 });
}

// ---------------------------------------------------------------- audio
const music = {
  ctx:null, master:null, sfx:null, musicGain:null, bedBus:null,
  tracks:{}, mode:'auto', hidden:false, actNow:1, loaded:false, poufPos:null, poufUntil:0,
  unlock() {
    if (this.ctx) { this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain(); this.master.gain.value = 0.9;
    this.master.connect(this.ctx.destination);
    this.sfx = this.ctx.createGain(); this.sfx.gain.value = 0.8; this.sfx.connect(this.master);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = 1; this.musicGain.connect(this.master);
    this.bedBus = this.ctx.createGain(); this.bedBus.gain.value = 1; this.bedBus.connect(this.musicGain);
    this.startWind();
    this.loadAll();
  },
  async loadAll() {
    const defs = [
      ['stella', 'assets/music/spiritfarer.m4a', 0.5, true],
      ['melody', 'assets/music/melody_flute.m4a', 0.5, true],
      ['pouf',   'assets/music/pouf_violin.m4a', 0.55, false]
    ];
    await Promise.all(defs.map(async ([name, url, base, loop]) => {
      try {
        const res = await fetch(url);
        if (!res.ok) throw 0;
        const buf = await this.ctx.decodeAudioData(await res.arrayBuffer());
        const gain = this.ctx.createGain(); gain.gain.value = 0; gain.connect(this.bedBus);
        this.tracks[name] = { buf, gain, base, loop, src:null };
        if (loop) this.startLoop(name);
      } catch (e) { console.log('music missing: ' + name); }
    }));
    this.loaded = true;
    this.apply();
  },
  startLoop(name) {
    const t = this.tracks[name];
    if (!t || !t.buf || t.src) return;
    const src = this.ctx.createBufferSource();
    src.buffer = t.buf; src.loop = true;
    src.loopStart = 0.05; src.loopEnd = t.buf.duration - 0.1;
    src.connect(t.gain); src.start();
    t.src = src;
  },
  desiredBed() {
    if (this.mode === 'off') return null;
    if (this.mode !== 'auto') return { name:this.mode, vol:0.5 };
    if (this.hidden) return { name:'stella', vol:0.35 };   // Stella is the away theme
    return this.actNow >= 3 ? { name:'melody', vol:0.5 } : { name:'stella', vol:0.5 };
  },
  apply() {
    if (!this.ctx || !this.loaded) return;
    const want = this.desiredBed();
    const now = this.ctx.currentTime;
    for (const [name, t] of Object.entries(this.tracks)) {
      if (!t.buf) continue;
      const target = (want && want.name === name) ? want.vol * t.base * 2 : 0;
      if (want && want.name === name && !t.src) this.startLoop(name); // pinned pouf
      t.gain.gain.cancelScheduledValues(now);
      t.gain.gain.setValueAtTime(t.gain.gain.value, now);
      t.gain.gain.linearRampToValueAtTime(target, now + 1.6);
    }
  },
  setContext({ act:a, hidden:h }) {
    if (a !== undefined) this.actNow = a;
    if (h !== undefined) this.hidden = h;
    this.apply();
  },
  cycle() {
    const modes = ['auto','stella','melody','pouf','off'];
    const labels = { auto:'auto (contextual)', stella:"Stella's Departure",
                     melody:"Melody's flute", pouf:"Pouf's violin", off:'off' };
    this.mode = modes[(modes.indexOf(this.mode) + 1) % modes.length];
    this.apply();
    toast('music: ' + labels[this.mode]);
  },
  sting() {                                   // Pouf interrupts the cozy
    const t = this.tracks.pouf;
    if (!this.ctx || !t || !t.buf || this.mode === 'off' || this.mode === 'pouf') return;
    const now = this.ctx.currentTime;
    if (now < this.poufUntil) return;         // one violinist on stage at a time
    this.poufUntil = now + 9;
    // playhead survives between stings — each moldy mango gets the next 9s of the cut
    if (this.poufPos === null) this.poufPos = POUF_STING_START !== null ? POUF_STING_START : t.buf.duration * 0.55;
    if (t.buf.duration - this.poufPos < 9.5) this.poufPos = 0;
    const start = this.poufPos;
    this.poufPos += 9;
    const g = this.ctx.createGain(); g.gain.value = 0; g.connect(this.musicGain);
    const src = this.ctx.createBufferSource(); src.buffer = t.buf; src.connect(g);
    src.start(now, start);
    g.gain.linearRampToValueAtTime(0.45, now + 0.25);
    g.gain.setValueAtTime(0.45, now + 7.2);
    g.gain.linearRampToValueAtTime(0, now + 8.8);
    src.stop(now + 9);
    this.bedBus.gain.cancelScheduledValues(now);
    this.bedBus.gain.setValueAtTime(this.bedBus.gain.value, now);
    this.bedBus.gain.linearRampToValueAtTime(0.15, now + 0.4);
    this.bedBus.gain.setValueAtTime(0.15, now + 6.8);
    this.bedBus.gain.linearRampToValueAtTime(1, now + 8.8);
  },
  away(hidden) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    this.sfx.gain.cancelScheduledValues(now);
    this.sfx.gain.setValueAtTime(this.sfx.gain.value, now);
    this.sfx.gain.linearRampToValueAtTime(hidden ? 0 : 0.8, now + 0.8);
    this.setContext({ hidden });
  },
  // ---- procedural SFX
  startWind() {
    const len = this.ctx.sampleRate * 2;
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < len; i++) { last = (last + (Math.random()*2-1)*0.02) * 0.998; d[i] = last * 3; }
    const src = this.ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    this.windFilter = this.ctx.createBiquadFilter();
    this.windFilter.type = 'lowpass'; this.windFilter.frequency.value = 550;
    this.windGain = this.ctx.createGain(); this.windGain.gain.value = 0.05;
    src.connect(this.windFilter); this.windFilter.connect(this.windGain);
    this.windGain.connect(this.sfx); src.start();
    this.nextGust = this.ctx.currentTime + rand(5, 11);
    this.nextCricket = 0;
  },
  tick(actNow) {                              // called from game loop
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    if (now > this.nextGust) {
      this.windGain.gain.linearRampToValueAtTime(0.11, now + 1.2);
      this.windGain.gain.linearRampToValueAtTime(0.05, now + 3.2);
      this.windFilter.frequency.linearRampToValueAtTime(900, now + 1.2);
      this.windFilter.frequency.linearRampToValueAtTime(550, now + 3.2);
      this.nextGust = now + rand(6, 13);
    }
    if (actNow >= 3 && now > this.nextCricket && !this.hidden) {
      for (const dtk of [0, 0.09]) this.tone(4200, now + dtk, 0.035, 0.05, 'sine');
      this.nextCricket = now + rand(1.2, 2.9);
    }
  },
  tone(freq, when, dur, vol, type='triangle', dest) {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, when + dur);
    o.connect(g); g.connect(dest || this.sfx);
    o.start(when); o.stop(when + dur + 0.05);
  },
  chime(step) {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const f = PENTA[clamp(step, 0, PENTA.length - 1)];
    this.tone(f, now, 0.42, 0.34);
    this.tone(f * 2.003, now, 0.3, 0.07);
  },
  holy() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    [880, 1108.7, 1318.5].forEach((f, i) => this.tone(f, now + i * 0.09, 0.5, 0.28));
    this.tone(2637, now + 0.28, 0.6, 0.1, 'sine');
  },
  sour() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    this.tone(311, now, 0.35, 0.2, 'sawtooth');
    this.tone(329.6, now, 0.35, 0.2, 'sawtooth');
  },
  whoosh() {                                    // velvet sweep under the curtain close
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const len = this.ctx.sampleRate * 2.2;
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < len; i++) { last = (last + (Math.random()*2-1)*0.04) * 0.996; d[i] = last * 2.4; }
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420;
    const g = this.ctx.createGain(); g.gain.value = 0;
    src.connect(lp); lp.connect(g); g.connect(this.sfx);
    g.gain.linearRampToValueAtTime(0.22, now + 0.9);
    g.gain.linearRampToValueAtTime(0, now + 2.2);
    src.start(now);
  },
  boomPop() {
    if (!this.ctx) return;
    const now = this.ctx.currentTime;
    const len = this.ctx.sampleRate * 0.18;
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1600;
    const g = this.ctx.createGain(); g.gain.value = 0.5;
    src.connect(bp); bp.connect(g); g.connect(this.sfx); src.start(now);
    this.tone(1318.5, now + 0.05, 0.4, 0.2);
  }
};

// ---------------------------------------------------------------- toast
const toastEl = document.getElementById('toast');
let toastT = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.style.opacity = 1;
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.style.opacity = 0, 1600);
}

// ---------------------------------------------------------------- spawning
function pickType() {
  const r = Math.random(); let c = 0;
  for (const t of MANGO_TYPES) { c += t.rarity; if (r < c) return t; }
  return MANGO_TYPES[0];
}
function spawnCluster(x) {
  const n = 2 + Math.floor(Math.random() * 4);
  const baseY = rand(H * 0.16, H * 0.62);
  for (let i = 0; i < n; i++) {
    mangoes.push({
      wx: x + i * rand(36, 50), y: baseY + Math.sin(i * 1.7) * 26 + rand(-12, 12),
      type: pickType(), phase: rand(0, 6.28), stem: rand(26, 42),
      r: 26, plucked: 0, px: 0, py: 0
    });
  }
}
function ensureSpawns() {
  while (spawnX < camX + W + 500) {
    spawnCluster(spawnX);
    spawnX += rand(240, 430);
  }
  mangoes = mangoes.filter(m => m.wx > camX - 250 && m.plucked < 1);
}

// ---------------------------------------------------------------- particles
function juice(x, y, type) {
  const cols = type.name === 'Moldy' ? ['#8a7a3a', '#6b5b2a', '#a39150']
    : type.name === 'Miyazaki' ? [PAL.crimson, PAL.gold, PAL.orange, '#fff1c9']
    : [PAL.gold, '#f9d976', PAL.orange];
  const n = type.name === 'Miyazaki' ? 22 : 11;
  for (let i = 0; i < n; i++) {
    const a = rand(0, 6.28), sp = rand(60, type.name === 'Miyazaki' ? 260 : 170);
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 60,
      g: 320, life: rand(0.5, 0.9), t: 0, size: rand(2.5, 5.5),
      color: cols[Math.floor(Math.random()*cols.length)] });
  }
}
function sparkBurst(x, y) {                    // firefly boom
  for (let i = 0; i < 38; i++) {
    const a = rand(0, 6.28), sp = rand(90, 320);
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      g: 140, life: rand(0.5, 1.1), t: 0, size: rand(1.8, 4),
      color: ['#F6C453','#FFE9A0','#FFD24A','#fff'][Math.floor(Math.random()*4)] });
  }
}
function popup(x, y, text, color, size) {
  popups.push({ x, y, text, color: color || PAL.gold, size: size || 20, t: 0, life: 1.3 });
}

// ---------------------------------------------------------------- messenger firefly
function maybeMessenger() {
  if (messenger) return;
  const pool = FIREFLY_LINES.map((l, i) => ({ ...l, i }))
    .filter(l => !usedLines.has(l.i) && (!l.act || act + 1 >= l.act));
  if (!pool.length) { usedLines.clear(); return maybeMessenger(); }
  const line = pool[Math.floor(Math.random() * pool.length)];
  usedLines.add(line.i);
  messenger = { line, wx: camX + W + 60, y: clamp(bat.y + rand(-90, 60), H*0.15, H*0.7),
    t: 0, boomAt: line.boom ? 5.0 : Infinity, boomed: false, dead: false,
    speed: line.mumble ? 7.5 : 13, bob: rand(0, 6.28), trail: [], trailT: 0 };
}
function updateMessenger(dt) {
  if (!messenger) return;
  const m = messenger;
  m.t += dt;
  m.wx -= (worldSpeed * 0.06 + m.speed + Math.sin(m.t * 0.9 + m.bob) * 9) * dt;  // lazy, firefly-paced
  m.y += Math.sin(m.t * 1.2 + m.bob) * 18 * dt;
  m.trailT += dt;
  if (!m.boomed && m.trailT > 0.055) {
    m.trailT = 0;
    m.trail.push({ wx: m.wx, y: m.y });
    if (m.trail.length > 16) m.trail.shift();
  }
  if (!m.boomed && m.t > m.boomAt) {
    m.boomed = true;
    sparkBurst(m.wx - camX, m.y);
    music.boomPop();
    m.vy = 40;                                     // comic drop
  }
  if (m.boomed) { m.vy += 260 * dt; m.y += m.vy * dt; }
  if (m.wx < camX - 120 || m.y > H + 40 || m.t > 32) messenger = null;
}

// ---------------------------------------------------------------- pluck
function pluck(m) {
  m.plucked = 0.001; m.px = m.wx; m.py = m.y;
  pluckTotal++;
  const type = m.type;
  const sx = m.wx - camX;
  if (type.name === 'Moldy') {
    combo = 0;
    dizzyT = 5;
    music.sour();
    music.sting();
    popup(sx, m.y - 30, 'oough...', '#9aa06b', 16);
    juice(sx, m.y, type);
  } else {
    combo++; comboT = 2.5;
    bestCombo = Math.max(bestCombo, combo);
    holyCount++;
    belly = Math.min(BELLY_MAX, belly + type.belly);
    music.chime(combo - 1);
    juice(sx, m.y, type);
    if (type.name === 'Miyazaki') {
      music.holy();
      popup(sx, m.y - 34, 'HOLY MIYAZAKI MANGO', PAL.gold, 19);
      popup(sx, m.y - 10, '+100', '#fff1c9', 15);
    }
    if (combo >= 3) popup(bat.x - camX + 40, bat.y - 44, '×' + combo, '#fff1c9', 15);
    if (pluckTotal % 10 === 0) maybeMessenger();
  }
  // act progression
  const targetAct = belly >= ACT_AT[2] ? 2 : belly >= ACT_AT[1] ? 1 : 0;
  if (targetAct !== act) {
    act = targetAct;
    actCard = { name: ACT_NAMES[act], num: act + 1, t: 0 };
    music.setContext({ act: act + 1 });
  }
  if (belly >= BELLY_MAX && !curtain) beginCurtain();
}

// ---------------------------------------------------------------- curtain
const curtainUI = document.getElementById('curtainUI');
function beginCurtain() {
  state = 'curtain';
  curtain = { t: 0, signed: false, savedIni: null, p: 0, prevP: 0, vel: 0, sh: { x: 0, v: 0 } };
  bat.holding = false;

function scores() {

}
function saveScore(ini) {

    list.sort((a, b) => b.holy - a.holy || b.combo - a.combo);

document.querySelectorAll('#initialsRow button[data-ini]').forEach(b =>

// ---------------------------------------------------------------- update
function update(dt) {
  tGlobal += dt;
  ensureSpawns();

  const dizzy = dizzyT > 0;
  if (dizzy) dizzyT -= dt;

  if (state === 'play') {
    // bat physics — hold to rise, release to glide
    const lift = dizzy ? -640 : -1150;
    const grav = 780;
    bat.vy += (bat.holding ? lift : grav) * dt * (bat.holding ? 0.55 : 1);
    if (dizzy) bat.vy += Math.sin(tGlobal * 2.2) * 260 * dt;   // drift
    bat.vy = clamp(bat.vy, -320, 380);
    bat.y += bat.vy * dt;
    const ceil = H * 0.07, floor = H * 0.88 - 26;
    if (bat.y < ceil) { bat.y = ceil; bat.vy = Math.max(bat.vy, 0); }
    if (bat.y > floor) {
      bat.y = floor; bat.vy = Math.min(bat.vy, 0);
      if (Math.random() < 0.3) particles.push({ x: bat.x - camX - 20, y: H*0.885,
        vx: -rand(30,80), vy: -rand(20,70), g: 300, life: 0.5, t: 0, size: 2.5, color: PAL.deepLeaf });
    }
    bat.x += worldSpeed * dt;
    camX = bat.x - W * 0.35;
    // flap animation
    bat.flapT += dt;
    if (bat.holding) { if (bat.flapT > 0.12) { bat.frame ^= 1; bat.flapT = 0; } }
    else bat.frame = 0;
    // combo timer
    if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
    // collisions
    const mx = bat.x + 34, my = bat.y;
    for (const m of mangoes) {
      if (m.plucked) continue;
      const sway = Math.sin(tGlobal * 1.6 + m.phase) * 7;
      const dx = m.wx + sway - mx, dy = m.y - my;
      if (dx * dx + dy * dy < (bat.r + m.r) * (bat.r + m.r)) pluck(m);
    }
  }

  if (state === 'curtain') {
    curtain.t += dt;
    // bat settles onto an implied perch, world eases to rest
    worldSpeed = lerp(worldSpeed, 0, Math.min(1, dt * 1.6));
    bat.x += worldSpeed * dt;
    camX = bat.x - W * 0.35;
    const perchY = H * 0.42;
    bat.y = lerp(bat.y, perchY + Math.sin(tGlobal * 1.4) * 5, Math.min(1, dt * 2.2));
    bat.frame = 0;
    // curtain sweep: eased progress + a shear spring so the hem trails the rail, then settles
    const pr = clamp((curtain.t - 0.4) / 2.0, 0, 1);
    const p = pr < 0.5 ? 4 * pr * pr * pr : 1 - Math.pow(-2 * pr + 2, 3) / 2;
    curtain.vel = dt > 0 ? (p - curtain.prevP) / dt : 0;
    curtain.prevP = p; curtain.p = p;
    const sh = curtain.sh, desired = clamp(curtain.vel * 150, 0, 95);
    sh.v += ((desired - sh.x) * 42 - sh.v * 6.5) * dt;
    sh.x += sh.v * dt;
    if (curtain.t > 3.4 && curtainUI.style.display !== 'block') curtainUI.style.display = 'block';
  } else worldSpeed = lerp(worldSpeed, 175, dt * 2);

  // pluck tween on eaten mangoes
  for (const m of mangoes) if (m.plucked) {
    m.plucked += dt * 6;
    m.wx = lerp(m.px, bat.x + 30, easeOut(Math.min(1, m.plucked)));
    m.y = lerp(m.py, bat.y, easeOut(Math.min(1, m.plucked)));
  }

  // act blend eases
  actBlend = lerp(actBlend, act, Math.min(1, dt * 0.8));
  if (actCard) { actCard.t += dt; if (actCard.t > 3.2) actCard = null; }

  // particles / popups
  for (const p of particles) { p.t += dt; p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
  particles = particles.filter(p => p.t < p.life);
  for (const p of popups) { p.t += dt; p.y -= 34 * dt; }
  popups = popups.filter(p => p.t < p.life);

  // ambient fireflies from late dusk on
  const wantFlies = actBlend > 0.55 ? Math.round(lerp(0, 15, Math.min(1, (actBlend - 0.55) / 1.2))) : 0;
  while (wanderers.length < wantFlies)
    wanderers.push({ x: rand(0, W), y: rand(H*0.1, H*0.8), a: rand(0,6.28), tw: rand(0,6), sp: rand(5,14), trail: [], tt: 0 });
  for (const f of wanderers) {
    f.a += rand(-1.4, 1.4) * dt;
    f.x += Math.cos(f.a) * f.sp * dt - worldSpeed * 0.12 * dt;
    f.y += Math.sin(f.a) * f.sp * dt;
    if (f.x < -20) { f.x = W + 10; f.trail.length = 0; }
    if (f.x > W + 20) { f.x = -10; f.trail.length = 0; }
    f.y = clamp(f.y, H*0.05, H*0.85);
    f.tt += dt;
    if (f.tt > 0.08) { f.tt = 0; f.trail.push({ x: f.x, y: f.y }); if (f.trail.length > 7) f.trail.shift(); }
  }

  updateMessenger(dt);
  music.tick(act + 1);
}

// ---------------------------------------------------------------- render
function skyColors() {
  const i = Math.floor(clamp(actBlend, 0, 2)), f = clamp(actBlend - i, 0, 1);
  const a = ACT_SKIES[i], b = ACT_SKIES[Math.min(2, i + 1)];
  return [0,1,2].map(k => hexLerp(a[k], b[k], f));
}
function drawSky() {
  const [top, mid, bot] = skyColors();

  g.addColorStop(0, top); g.addColorStop(0.55, mid); g.addColorStop(1, bot);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // sun (act I) — fades through dusk
  const sunA = clamp(1 - actBlend * 1.1, 0, 1);
  if (sunA > 0.01) {
    ctx.save(); ctx.globalAlpha = sunA;
    const sx = W * 0.72, sy = H * 0.52 + actBlend * H * 0.2;
    const rg = ctx.createRadialGradient(sx, sy, 4, sx, sy, 120);
    rg.addColorStop(0, 'rgba(255,236,190,0.95)'); rg.addColorStop(1, 'rgba(255,217,160,0)');
    ctx.fillStyle = rg; ctx.fillRect(sx-120, sy-120, 240, 240);
    ctx.fillStyle = '#FFF3D6'; ctx.beginPath(); ctx.arc(sx, sy, 34, 0, 6.29); ctx.fill();
    ctx.restore();
  }
  // stars + moon (act III)
  const nightA = clamp((actBlend - 1.15) / 0.85, 0, 1);
  if (nightA > 0.01) {
    ctx.save(); ctx.globalAlpha = nightA;
    ctx.fillStyle = '#FFF6E3';

    }
    ctx.globalAlpha = nightA;
    const mx = W * 0.78, my = H * 0.18;
    const rg = ctx.createRadialGradient(mx, my, 8, mx, my, 110);
    rg.addColorStop(0, 'rgba(246,196,83,0.5)'); rg.addColorStop(1, 'rgba(246,196,83,0)');
    ctx.fillStyle = rg; ctx.fillRect(mx-110, my-110, 220, 220);
    ctx.fillStyle = '#F6D98B'; ctx.beginPath(); ctx.arc(mx, my, 30, 0, 6.29); ctx.fill();
    ctx.fillStyle = 'rgba(200,160,90,0.35)';
    ctx.beginPath(); ctx.arc(mx - 9, my - 5, 6, 0, 6.29); ctx.arc(mx + 8, my + 9, 4, 0, 6.29); ctx.fill();
    ctx.restore();
  }
}
function drawMountains() {
  if (IMGS.mountains) {
    const w = W * 1.5, h = w * (IMGS.mountains.height / IMGS.mountains.width);
    const off = (camX * 0.14) % w;
    for (let i = -1; i <= 1; i++) ctx.drawImage(IMGS.mountains, -off + i * w, H * 0.74 - h, w, h);
    return;
  }
  // sparse and monumental: one, sometimes two on screen, hazy, dissolving into the treeline
  const par = 0.08, base = H * 0.78;
  const duskT = clamp(actBlend / 2, 0, 1);
  const bodyRGB = hexLerp('#A490BE', '#232340', duskT);
  const snowRGB = hexLerp('#FFF6E0', '#C6CFEC', duskT);
  const spacing = 1000;
  const start = Math.floor((camX * par - 700) / spacing);
  const n = Math.ceil(W / spacing) + 2;
  for (let i = start; i < start + n; i++) {
    const h = Math.abs(Math.sin(i * 127.323) * 7919.77) % 1;
    if (h < 0.4) continue;                       // some slots stay empty
    const x = i * spacing - camX * par + (h - 0.5) * 700;
    const peakH = (0.34 + h * 0.18) * H;
    const halfW = peakH * (1.15 + h * 0.5);
    const py = base - peakH;
    const g = ctx.createLinearGradient(0, py, 0, base);
    g.addColorStop(0, bodyRGB.replace('rgb', 'rgba').replace(')', ',0.5)'));
    g.addColorStop(1, bodyRGB.replace('rgb', 'rgba').replace(')', ',0.06)'));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(x - halfW, base);
    ctx.lineTo(x, py);
    ctx.lineTo(x + halfW, base);
    ctx.closePath(); ctx.fill();
    if (h > 0.72) {                              // occasional shoulder peak
      const sx = x + halfW * 0.42, sy = base - peakH * 0.55;
      ctx.beginPath();
      ctx.moveTo(sx - peakH * 0.5, base);
      ctx.lineTo(sx, sy);
      ctx.lineTo(sx + peakH * 0.6, base);
      ctx.closePath(); ctx.fill();
    }
    const f = 0.24;                              // soft snowcap
    const lx = lerp(x, x - halfW, f), rx = lerp(x, x + halfW, f);
    const ly = lerp(py, base, f);
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = snowRGB;
    ctx.beginPath();
    ctx.moveTo(x, py);
    ctx.lineTo(lx, ly);
    ctx.lineTo(lerp(lx, rx, 0.36), ly + peakH * 0.045);
    ctx.lineTo(lerp(lx, rx, 0.6), ly + peakH * 0.02);
    ctx.lineTo(rx, ly);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function treeTint(dark) {
  const duskT = clamp(actBlend / 2, 0, 1);

}
function drawTreeLayer(par, baseY, scale, dark) {
  const img = dark ? IMGS.trees_near : IMGS.trees_far;
  const off = (camX * par) % (W * 1.4);
  if (img) {
    const w = W * 1.4, h = w * (img.height / img.width);
    for (let i = -1; i <= 1; i++) ctx.drawImage(img, -off + i * w, baseY - h, w, h);
    return;
  }
  ctx.fillStyle = treeTint(dark);
  const seedStep = 200 * scale;
  const start = Math.floor((camX * par - seedStep) / seedStep);
  for (let i = start; i < start + Math.ceil(W / seedStep) + 3; i++) {
    const h = Math.abs(Math.sin(i * 12.9898) * 43758.5453) % 1;    // deterministic per tree
    const x = i * seedStep - camX * par;
    const th = (0.09 + h * 0.08) * H * scale, cw = seedStep * (0.8 + h * 0.45);
    // one path per blob — chained ellipse() subpaths join via chords that notch the fill
    ctx.beginPath(); ctx.ellipse(x, baseY - th, cw * 0.55, th * 0.62, 0, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x - cw * 0.3, baseY - th * 0.62, cw * 0.36, th * 0.4, 0, 0, 6.29); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + cw * 0.32, baseY - th * 0.58, cw * 0.33, th * 0.38, 0, 0, 6.29); ctx.fill();
    ctx.fillRect(x - 5 * scale, baseY - th * 0.5, 10 * scale, th * 0.5);

}
function drawGround() {
  const y = H * 0.88;

  ctx.fillStyle = hexLerp('#3E5A32', '#141d14', clamp(actBlend / 2, 0, 1));
  ctx.fillRect(0, y, W, H - y);
  ctx.strokeStyle = 'rgba(20,30,18,0.5)'; ctx.lineWidth = 2;
  const step = 26, start = Math.floor(camX / step);
  ctx.beginPath();
  for (let i = start; i < start + W / step + 2; i++) {
    const h = Math.abs(Math.sin(i * 7.31) * 917.27) % 1;
    const x = i * step - camX;
    ctx.moveTo(x, y + 2); ctx.quadraticCurveTo(x + 3, y - 8 - h * 9, x + 7, y + 1);
  }

}
function drawMangoImg(type, x, y, size) {

    ctx.drawImage(img, x - w / 2, y - h / 2, w, h);

function drawMangoes() {

    const x = m.wx - camX + sway, y = m.y;

      ctx.beginPath(); ctx.moveTo(x - sway * 0.5, y - m.stem); ctx.quadraticCurveTo(x, y - m.stem / 2, x, y - 16); ctx.stroke();
      ctx.fillStyle = PAL.deepLeaf;

    }
    const size = m.type.name === 'Miyazaki' ? 62 : 52;

      const rg = ctx.createRadialGradient(x, y, 6, x, y, 46);

function drawBat() {
  const x = bat.x - camX, y = bat.y;

  const tilt = clamp(bat.vy / 900, -0.28, 0.34);

  ctx.translate(x, y); ctx.rotate(tilt);
  if (img) {

  const bx = W - 34, by = 30;
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = 'rgba(30,26,42,0.45)';
  ctx.beginPath(); ctx.arc(bx, by, 17, 0, 6.29); ctx.fill();
  ctx.fillStyle = PAL.paper; ctx.font = '16px Georgia'; ctx.textAlign = 'center';
  ctx.fillText(music.mode === 'off' ? '♪̸' : '♪', bx, by + 6);
  ctx.restore();
  ctx.textAlign = 'left';
}
function drawActCard() {
  if (!actCard) return;
  const a = actCard.t < 0.6 ? actCard.t / 0.6 : actCard.t > 2.4 ? clamp((3.2 - actCard.t) / 0.8, 0, 1) : 1;
  ctx.save();
  ctx.globalAlpha = a;
  const ink = actCard.num >= 3 ? PAL.paper : PAL.plum;
  ctx.fillStyle = ink; ctx.textAlign = 'center';
  ctx.font = '14px Georgia';
  ctx.fillText('— ACT ' + 'I'.repeat(actCard.num).replace('III','III').replace('II','II') + ' —', W/2, H*0.24);
  ctx.font = 'italic 30px Georgia';
  ctx.fillText(actCard.name, W / 2, H * 0.24 + 38);
  ctx.restore();
  ctx.textAlign = 'left';
}
function drawTitle() {
  ctx.save();
  ctx.textAlign = 'center';
  const cy = H * 0.34;
  drawMangoImg(MANGO_TYPES[2], W / 2, cy - 86 + Math.sin(tGlobal * 1.2) * 6, 92);
  ctx.fillStyle = PAL.plum;
  ctx.font = (W < 440 ? '34px' : '44px') + ' Georgia';
  ctx.fillText("Sahra's Mango Quest", W / 2, cy + 10);
  ctx.font = 'italic 20px Georgia';
  ctx.fillText('— Orchard Dusk —', W / 2, cy + 44);
  ctx.font = '15px Georgia';
  ctx.globalAlpha = 0.85;
  ctx.fillText('hold to fly · release to glide', W / 2, cy + 92);
  ctx.fillText('eat the sacred mangoes', W / 2, cy + 114);
  ctx.globalAlpha = 0.65 + 0.35 * Math.sin(tGlobal * 2.6);
  ctx.font = 'italic 18px Georgia';
  ctx.fillText('tap to begin', W / 2, cy + 168);
  ctx.restore();
  ctx.textAlign = 'left';
}
function curtainEdgePoints(fromLeft, w, shear) {
  // the hem: trails the rail while moving (drape grows with depth), with a traveling wave
  const base = fromLeft ? w : W - w;
  const dir = fromLeft ? 1 : -1;
  const c = curtain || { p: 1, vel: 0 };
  const velEnv = Math.min(1, Math.abs(c.vel) * 1.4 + Math.abs(shear) / 60);
  const amp = 4 + 30 * velEnv;
  const pts = [], N = 26;
  for (let k = 0; k <= N; k++) {
    const yy = k / N * H;
    const drape = Math.pow(k / N, 1.4) * shear;
    const wave = amp * Math.sin(yy * 0.016 + tGlobal * 5.2) * (0.25 + 0.75 * k / N);
    pts.push({ x: base - dir * (drape + wave), y: yy });
  }
  return pts;
}
function drawCurtainPanel(fromLeft, w, shear) {
  if (w <= 2) return;
  const x0 = fromLeft ? 0 : W;
  const pts = curtainEdgePoints(fromLeft, w, shear);
  const path = new Path2D();
  path.moveTo(x0, 0);
  for (const p of pts) path.lineTo(p.x, p.y);
  path.lineTo(x0, H);
  path.closePath();
  ctx.save();                                    // soft shadow hugging the hem
  ctx.translate(fromLeft ? 16 : -16, 5);
  ctx.fillStyle = 'rgba(12,6,8,0.22)';
  ctx.fill(path);
  ctx.restore();
  // velvet: smooth sinusoidal folds that gather as the curtain settles
  const c = curtain || { p: 1 };
  const folds = lerp(2.6, 4.6, c.p) + 0.12 * Math.sin(tGlobal * 0.8);
  const g = ctx.createLinearGradient(fromLeft ? 0 : W - w, 0, fromLeft ? w : W, 0);
  const NS = 30;
  for (let k = 0; k <= NS; k++) {
    const t = k / NS;
    const b = Math.sin(t * folds * Math.PI * 2) * 0.5 + 0.5;
    g.addColorStop(t, hexLerp('#5E1815', '#96382B', clamp(0.25 + 0.6 * b + 0.15 * t, 0, 1)));
  }
  ctx.fillStyle = g;
  ctx.fill(path);
  ctx.save();                                    // rail gather + floor shadow, inside the cloth
  ctx.clip(path);
  const vg = ctx.createLinearGradient(0, 0, 0, H);
  vg.addColorStop(0, 'rgba(20,6,6,0.34)');
  vg.addColorStop(0.14, 'rgba(20,6,6,0)');
  vg.addColorStop(0.9, 'rgba(20,6,6,0)');
  vg.addColorStop(1, 'rgba(20,6,6,0.22)');
  ctx.fillStyle = vg;
  ctx.fillRect(fromLeft ? 0 : W - w - 130, 0, w + 130, H);
  ctx.restore();
  ctx.strokeStyle = 'rgba(246,196,83,0.5)';      // quiet trim along the hem
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (const p of pts) ctx.lineTo(p.x, p.y);
  ctx.stroke();
}
function drawCurtain() {
  if (!curtain || curtain.t < 0.4) return;
  const a = clamp((curtain.t - 2.6) / 0.8, 0, 1);  // playbill enters after the cloth settles
  const cw = Math.min(340, W - 40), chh = 418;
  const cx = (W - cw) / 2, cy0 = H * 0.5 - chh / 2 - 16;
  const cy = lerp(cy0 + 40, cy0, easeOut(a));
  ctx.save();
  ctx.globalAlpha = 0.3 * clamp((curtain.t - 0.4) / 1.2, 0, 1);
  ctx.fillStyle = 'rgb(20,18,32)'; ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  const panelW = Math.max(W * 0.14, (W - Math.max(cw + 28, W * 0.34)) / 2) * (curtain.p || 0);
  drawCurtainPanel(true, panelW, curtain.sh.x);
  drawCurtainPanel(false, panelW, curtain.sh.x);
  ctx.globalAlpha = a;
  ctx.fillStyle = PAL.paper;
  roundRect(cx, cy, cw, chh, 6); ctx.fill();
  ctx.strokeStyle = PAL.plum; ctx.lineWidth = 1.5;
  roundRect(cx + 8, cy + 8, cw - 16, chh - 16, 4); ctx.stroke();
  drawMangoImg(MANGO_TYPES[2], W / 2, cy + 58, 62);        // the sacred one gets top billing
  ctx.fillStyle = PAL.plum; ctx.textAlign = 'center';
  let y = cy + 110;
  const line = (txt, font, dy, alpha) => {
    ctx.font = font; ctx.globalAlpha = a * (alpha || 1);
    ctx.fillText(txt, W / 2, y); y += dy;
  };
  line('P L A Y B I L L', '13px Georgia', 24, 0.75);
  line("Sahra's Mango Quest", '25px Georgia', 26);
  line('a one-bat show', 'italic 15px Georgia', 30, 0.85);
  line('starring', '12px Georgia', 18, 0.6);
  line('SAHRA as The Bat', '16px Georgia', 20);
  line('the mangoes as themselves', 'italic 13px Georgia', 18, 0.8);
  line('the fireflies: the ensemble', 'italic 13px Georgia', 18, 0.8);
  line('directed by DARYA', '13px Georgia', 26, 0.9);
  line(`Holy Mangoes: ${holyCount}    best combo ×${bestCombo}`, '15px Georgia', 26);
  const list = scores();
  if (list.length) {
    line('· the record ·', 'italic 12px Georgia', 18, 0.6);
    for (const s of list.slice(0, 3))
      line(`${s.ini} — ${s.holy} holy (×${s.combo})`, '13px Georgia', 17, 0.85);
  }
  ctx.restore();
  ctx.textAlign = 'left';
}

function render() {
  drawSky();
  drawMountains();
  drawTreeLayer(0.35, H * 0.88, 1.25, false);
  drawTreeLayer(0.65, H * 0.895, 1.0, true);
  drawWanderers(false);
  const wob = dizzyT > 0 ? Math.sin(tGlobal * 3.1) * 0.02 * Math.min(1, dizzyT) : 0;
  ctx.save();
  if (wob) { ctx.translate(W / 2, H / 2); ctx.rotate(wob); ctx.translate(-W / 2, -H / 2); }
  drawMangoes();
  if (state !== 'title') drawBat();
  ctx.restore();
  drawGround();
  drawWanderers(true);
  drawMessenger();
  // particles + popups over everything in world
  for (const p of particles) {
    ctx.globalAlpha = clamp(1 - p.t / p.life, 0, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, 6.29); ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of popups) {
    ctx.globalAlpha = clamp(1.4 - p.t / p.life * 1.4, 0, 1);
    ctx.fillStyle = p.color; ctx.font = p.size + 'px Georgia'; ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
  if (dizzyT > 0) {                                          // queasy vignette
    const rg = ctx.createRadialGradient(W/2, H/2, H * 0.3, W/2, H/2, H * 0.75);
    rg.addColorStop(0, 'rgba(120,150,80,0)'); rg.addColorStop(1, `rgba(110,140,70,${0.22 * Math.min(1, dizzyT)})`);
    ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
  }
  if (state === 'title') drawTitle();
  else { drawHUD(); drawActCard(); drawCurtain(); }
}

// ---------------------------------------------------------------- input
function press() {
  if (state === 'title') {
    music.unlock();
    resetRun();
    state = 'play';
    v1link.style.display = 'none';
    return;
  }
  if (state === 'play') bat.holding = true;
}
function release() { bat.holding = false; }
const v1link = document.getElementById('v1link');
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  // music button hit-test
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (state !== 'title' && Math.hypot(x - (W - 34), y - 30) < 22) { music.cycle(); return; }
  press();
});
canvas.addEventListener('pointerup', () => release());
canvas.addEventListener('pointercancel', () => release());
window.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); press(); } });
window.addEventListener('keyup', e => { if (e.code === 'Space') release(); });

document.addEventListener('visibilitychange', () => {
  paused = document.hidden;
  music.away(document.hidden);                 // Stella hums while she's away
});

// ---------------------------------------------------------------- loop
let lastT = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - lastT) / 1000; lastT = now;
  if (paused) return;
  dt = Math.min(dt, 0.05);
  update(dt);
  render();
}
requestAnimationFrame(loop);
bat.y = H * 0.45;
if (state === 'curtain' || state === 'title') v1link.style.display = '';

// ---------------------------------------------------------------- debug handle
function syncAct() {
  const targetAct = belly >= ACT_AT[2] ? 2 : belly >= ACT_AT[1] ? 1 : 0;
  if (targetAct !== act) {
    act = targetAct;
    actCard = { name: ACT_NAMES[act], num: act + 1, t: 0 };
    music.setContext({ act: act + 1 });
  }
}
window.SMQ = {
  get state() { return { state, belly, act, holyCount, combo, camX }; },
  fill(n) { belly = Math.min(BELLY_MAX - 1, n !== undefined ? n : ACT_AT[2]); syncAct(); },
  curtainNow() { belly = BELLY_MAX; syncAct(); beginCurtain(); },
  dizzy() { dizzyT = 5; music.sour(); music.sting(); },
  step(s) { const n = Math.ceil((s || 1) / 0.016); for (let i = 0; i < n; i++) update(0.016); render(); },
  line(i) { usedLines = new Set(); messenger = null;
    const L = FIREFLY_LINES[i] || FIREFLY_LINES[0];
    messenger = { line:L, wx: camX + W + 60, y: H * 0.4, t: 0,
      boomAt: L.boom ? 5 : Infinity, boomed: false, dead: false,
      speed: L.mumble ? 7.5 : 13, bob: 0, trail: [], trailT: 0 }; },
  music
};
</script>
</body>
